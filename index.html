<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampaignOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">C</div>
          <div>
            <div class="logo-title">CampaignOS</div>
            <div class="logo-sub">PLATAFORMA</div>
          </div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="ai-status">
          <div class="ai-dot"></div>
          <span>IA Conectada</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <div id="tab-dashboard" class="tab-section"></div>
      <div id="tab-campanhas" class="tab-section hidden"></div>
      <div id="tab-calendario" class="tab-section hidden"></div>
      <div id="tab-financeiro" class="tab-section hidden"></div>
      <div id="tab-ia" class="tab-section hidden"></div>
    </main>
  </div>

  <!-- Campaign Modal -->
  <div id="campaign-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <h2 id="modal-title">Nova Campanha</h2>
          <p class="modal-subtitle">Preencha manualmente ou use a IA para completar</p>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <button id="ai-fill-btn" onclick="gerarIA()" class="ai-fill-btn">
          <span>✦</span> Completar com IA (preencha nome, canal e objetivo antes)
        </button>
        <div id="ai-tip-box" class="ai-tip hidden"></div>

        <label class="lbl">NOME DA CAMPANHA *</label>
        <input id="f-nome" class="inp" type="text" placeholder="Ex: Black Friday 2026" />

        <div class="grid-2">
          <div>
            <label class="lbl">INÍCIO</label>
            <input id="f-inicio" class="inp" type="date" />
          </div>
          <div>
            <label class="lbl">FIM</label>
            <input id="f-fim" class="inp" type="date" />
          </div>
        </div>
        <div class="grid-2">
          <div>
            <label class="lbl">CANAL</label>
            <select id="f-canal" class="inp"></select>
          </div>
          <div>
            <label class="lbl">OBJETIVO</label>
            <select id="f-objetivo" class="inp"></select>
          </div>
        </div>
        <div class="grid-2">
          <div>
            <label class="lbl">STATUS</label>
            <select id="f-status" class="inp"></select>
          </div>
          <div>
            <label class="lbl">PÚBLICO-ALVO</label>
            <input id="f-publico" class="inp" type="text" placeholder="Ex: Mulheres 25-40 anos" />
          </div>
        </div>

        <div class="financeiro-box">
          <div class="financeiro-label">💰 DADOS FINANCEIROS</div>
          <div class="grid-3">
            <div>
              <label class="lbl" style="margin-top:0">ORÇAMENTO (R$)</label>
              <input id="f-orcamento" class="inp" type="number" placeholder="0" oninput="updateROI()" />
            </div>
            <div>
              <label class="lbl" style="margin-top:0">INVESTIDO (R$)</label>
              <input id="f-investido" class="inp" type="number" placeholder="0" />
            </div>
            <div>
              <label class="lbl" style="margin-top:0">RECEITA (R$)</label>
              <input id="f-receita" class="inp" type="number" placeholder="0" oninput="updateROI()" />
            </div>
          </div>
          <div id="roi-preview" class="roi-preview hidden"></div>
        </div>

        <div class="grid-2">
          <div>
            <label class="lbl">LEADS ESPERADOS</label>
            <input id="f-leads" class="inp" type="number" placeholder="0" />
          </div>
          <div>
            <label class="lbl">CONVERSÕES ESPERADAS</label>
            <input id="f-conversoes" class="inp" type="number" placeholder="0" />
          </div>
        </div>

        <label class="lbl">DESCRIÇÃO / ESTRATÉGIA</label>
        <textarea id="f-descricao" class="inp" style="resize:vertical;min-height:72px" placeholder="Descreva o objetivo, estratégia e detalhes da campanha..."></textarea>

        <label class="lbl">COR DA CAMPANHA</label>
        <div id="color-picker" class="color-picker"></div>

        <div class="modal-actions">
          <button onclick="closeModal()" class="btn-cancel">Cancelar</button>
          <button id="btn-save" onclick="saveCampaign()" class="btn-save">Criar Campanha</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
